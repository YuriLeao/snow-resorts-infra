name: Terraform

on:
  push:
    branches: [master]
    paths: ['terraform/**']
  pull_request:
    branches: [master]
    paths: ['terraform/**']
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to apply
        type: choice
        options: [staging, prod]
        default: staging

permissions:
  contents: read
  id-token: write   # OIDC to assume the AWS role

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.10.5

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [staging, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Format check
        run: terraform -chdir=terraform fmt -check -recursive
      - name: Validate ${{ matrix.env }}
        run: |
          cd terraform/envs/${{ matrix.env }}
          terraform init -backend=false
          terraform validate

  plan-apply:
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform apply (${{ github.event.inputs.environment }})
        run: |
          cd terraform/envs/${{ github.event.inputs.environment }}
          terraform init
          terraform apply -auto-approve
