<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — Snow Resorts</title>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      if (!token) {
        document.addEventListener('DOMContentLoaded', function () {
          document.getElementById('status').textContent = 'Missing reset token.';
        });
        return;
      }
      var appUrl = 'snowresorts://reset-password?token=' + encodeURIComponent(token);
      var meta = document.createElement('meta');
      meta.httpEquiv = 'refresh';
      meta.content = '0;url=' + appUrl;
      document.head.appendChild(meta);
      document.addEventListener('DOMContentLoaded', function () {
        var link = document.getElementById('open-app');
        link.href = appUrl;
        link.textContent = 'Open in Snow Resorts app';
        window.location.href = appUrl;
      });
    })();
  </script>
</head>
<body>
  <p id="status">Opening Snow Resorts app…</p>
  <p>If nothing happens, <a id="open-app" href="#">tap here to open the app</a>.</p>
</body>
</html>
