# Snow Resorts — local dev API gateway.
# Mirrors the prod ALB path-based routing so the mobile app and any client can talk to
# a single origin (http://localhost:8080) instead of the individual service ports.
#
# The 5 Spring services run on the HOST (./mvnw spring-boot:run), not in Docker, so the
# upstreams point at host.docker.internal:<port>. The full original request path is
# preserved (no prefix stripping) — services expect the new /snow-resort-service/v1/... path.

worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    # Upstreams = host-run Spring services (ports 8081-8085).
    upstream auth_service     { server host.docker.internal:8081; }
    upstream user_service     { server host.docker.internal:8082; }
    upstream resort_service   { server host.docker.internal:8083; }
    upstream location_service { server host.docker.internal:8084; }
    upstream activity_service { server host.docker.internal:8085; }

    # Unified Swagger UI container (compose service `swagger-ui`, same docker network).
    upstream swagger_ui       { server swagger-ui:8080; }

    # Shared proxy headers so downstream services see the real client + scheme.
    # Forward the ORIGINAL Host (incl. :8080) so springdoc advertises the gateway origin
    # as the OpenAPI `server` — this makes Swagger "Try it out" hit the gateway, which then
    # routes /snow-resort-service/v1/... to the right service.
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;
        server_name _;

        # Emit relative redirects so the client keeps the gateway origin (incl. :8080)
        # instead of nginx rebuilding an absolute URL with the internal listen port.
        absolute_redirect off;

        # --- Unified Swagger UI (single entry for all 5 services) ---
        # Open http://localhost:8080/swagger/ and pick a service from the top dropdown.
        # The swagger-ui container is configured (in docker-compose) with one URL per
        # service pointing at the /api-docs/<service> proxies below.
        location = /swagger {
            return 302 /swagger/;
        }
        location /swagger/ {
            proxy_pass http://swagger_ui;
        }

        # Per-service live OpenAPI specs (springdoc), proxied same-origin so the browser
        # avoids CORS. Each maps to that service's /v3/api-docs.
        location = /api-docs/auth {
            proxy_pass http://auth_service/v3/api-docs;
        }
        location = /api-docs/user {
            proxy_pass http://user_service/v3/api-docs;
        }
        location = /api-docs/resort {
            proxy_pass http://resort_service/v3/api-docs;
        }
        location = /api-docs/location {
            proxy_pass http://location_service/v3/api-docs;
        }
        location = /api-docs/activity {
            proxy_pass http://activity_service/v3/api-docs;
        }

        # --- auth-service (:8081) ---
        location /snow-resort-service/v1/auth {
            proxy_pass http://auth_service;
        }

        # JWKS through the gateway so resource servers can resolve it via :8080 too.
        location = /.well-known/jwks.json {
            proxy_pass http://auth_service;
        }

        # --- user-service (:8082) ---
        location /snow-resort-service/v1/users {
            proxy_pass http://user_service;
        }
        location /snow-resort-service/v1/friends {
            proxy_pass http://user_service;
        }

        # --- resort-service (:8083) ---
        location /snow-resort-service/v1/resorts {
            proxy_pass http://resort_service;
        }

        # --- location-service (:8084) ---
        location /snow-resort-service/v1/location {
            proxy_pass http://location_service;
        }

        # WebSocket STOMP endpoint (sticky to location-service in prod).
        location /ws {
            proxy_pass http://location_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- activity-service (:8085) ---
        location /snow-resort-service/v1/runs {
            proxy_pass http://activity_service;
        }
        location /snow-resort-service/v1/leaderboard {
            proxy_pass http://activity_service;
        }
    }
}
